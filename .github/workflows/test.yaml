name: test

on: 
  push:
    branches: 
      - main

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps: 
    -name: Checkout code
      uses: actions/checkout@v2

    -name: install Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '20'
    -name: install dependencies
      run: npm install

